# ============================================================
# 3주차 — JDBC Chat Memory 대안 프로필 (옵션)
# ============================================================
# 사용법:
#   ./gradlew bootRun --args='--spring.profiles.active=jdbc'
#
# 이 프로필을 실제로 활성화하려면 build.gradle에 아래 의존성을 추가해야 한다.
#
#   implementation 'org.springframework.ai:spring-ai-starter-model-chat-memory-repository-jdbc'
#   runtimeOnly    'com.h2database:h2'
#
# 또한 ChatMemoryConfig의 `chatMemoryRepository()` Bean을 주석 처리하거나
# @Profile("!jdbc")로 한정해야 자동 구성된 JdbcChatMemoryRepository가 주입된다.
# (Spring AI 1.0: starter-model-chat-memory-repository-jdbc가 자동으로
#  JdbcChatMemoryRepository를 등록한다)
#
# 강의 노트의 "InMemory vs JDBC 비교" 섹션을 참고하라.
# ============================================================

spring:
  application:
    name: baedal-support-agent
  datasource:
    url: jdbc:h2:mem:baedal;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen2.5
        options:
          temperature: 0.3
    # Spring AI 1.0은 JdbcChatMemoryRepository 사용 시 다음 속성으로
    # 스키마 자동 초기화 방식을 지정할 수 있다.
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: embedded   # always / never / embedded

logging:
  level:
    org.springframework.ai: DEBUG
